<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI House Predictor | Final Patch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2fe; --neon-purple: #bc13fe; --dark-bg: #050505; }
        body { font-family: 'Share Tech Mono', monospace; background-color: var(--dark-bg); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .cyber-panel { background: rgba(10, 10, 10, 0.9); border: 2px solid var(--neon-blue); border-radius: 5px; padding: 40px; box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); max-width: 800px; width: 100%; position: relative; }
        .form-control { background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon-blue); color: #00ff41; border-radius: 0; margin-bottom: 15px; }
        .btn-execute { background: transparent; border: 2px solid var(--neon-purple); color: var(--neon-purple); width: 100%; padding: 15px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.4s; }
        .btn-execute:hover { background: var(--neon-purple); color: white; box-shadow: 0 0 30px var(--neon-purple); }
        .prediction-box { margin-top: 30px; padding: 20px; border: 1px dashed #00ff41; background: rgba(0, 255, 65, 0.05); text-align: center; }
    </style>
</head>
<body>

<div class="cyber-panel">
    <h2 class="text-center" style="color: var(--neon-blue); font-family: 'Orbitron'; letter-spacing: 3px;">NEURAL PREDICTOR v3.0</h2>
    <p class="text-center text-muted small mb-4">SYSTEM CALIBRATED FOR 278 FEATURE ALIGNMENT</p>

    <form id="predictionForm" action="/predict" method="POST">
        <div class="row">
            <div class="col-md-6">
                <label class="small text-info">Living Area (SqFt)</label>
                <input type="number" class="form-control val" step="any" required>
            </div>
            <div class="col-md-6">
                <label class="small text-info">Overall Quality (1-10)</label>
                <input type="number" class="form-control val" step="any" required>
            </div>
            <div class="col-md-6">
                <label class="small text-info">Year Built</label>
                <input type="number" class="form-control val" step="any" required>
            </div>
            <div class="col-md-6">
                <label class="small text-info">Garage Capacity</label>
                <input type="number" class="form-control val" step="any" required>
            </div>
            <div class="col-md-6">
                <label class="small text-info">Total Bathrooms</label>
                <input type="number" class="form-control val" step="any" required>
            </div>
            <div class="col-md-6">
                <label class="small text-info">Basement Area</label>
                <input type="number" class="form-control val" step="any" required>
            </div>
            <div class="col-md-12">
                <label class="small text-info">Lot Frontage</label>
                <input type="number" class="form-control val" step="any" required>
            </div>
        </div>

        <div id="hiddenInputs"></div>

        <button type="button" onclick="submitData()" class="btn btn-execute">START PREDICTION SEQUENCE</button>
    </form>

    {% if prediction_text %}
    <div class="prediction-box">
        <h4 style="color: var(--neon-blue);">RESULT:</h4>
        <div style="font-size: 2rem;">{{ prediction_text }}</div>
    </div>
    {% endif %}

    <div class="mt-4 text-center small text-secondary">ENGINEER: ALI ABDELHALIM | ZAGAZIG UNIVERSITY</div>
</div>

<script>
function submitData() {
    const form = document.getElementById('predictionForm');
    const inputs = document.querySelectorAll('.val');
    const hiddenContainer = document.getElementById('hiddenInputs');
    hiddenContainer.innerHTML = ''; // تنظيف قديم

    // 1. إنشاء مصفوفة بـ 278 صفر
    let features = new Array(278).fill(0);

    // 2. وضع الـ 7 قيم بتوعنا في أول 7 أماكن
    inputs.forEach((input, index) => {
        features[index] = input.value || 0;
    });

    // 3. تحويل الـ 278 قيمة لمدخلات مخفية (Hidden Inputs) عشان الـ Python يشوفهم
    features.forEach((val, index) => {
        let input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'feature_' + index;
        input.value = val;
        hiddenContainer.appendChild(input);
    });

    // 4. إرسال الفورم
    form.submit();
}
</script>

</body>
</html>
